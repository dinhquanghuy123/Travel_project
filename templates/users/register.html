{% extends 'base.html' %}

{% block title %}Đăng ký - TravelVN{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow border-0 mt-5">
            <div class="card-body p-4">

                <h2 class="text-center fw-bold mb-4">
                    Đăng ký tài khoản
                </h2>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">
                            Tên đăng nhập
                        </label>
                        {{ form.username }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Email
                        </label>
                        {{ form.email }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Mật khẩu
                        </label>
                        {{ form.password1 }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Nhập lại mật khẩu
                        </label>
                        {{ form.password2 }}
                    </div>

                    <button type="submit"
                            class="btn btn-success w-100">
                        Đăng ký
                    </button>

                </form>

                <hr>

                <p class="text-center mb-0">
                    Đã có tài khoản?
                    <a href="{% url 'login' %}">
                        Đăng nhập
                    </a>
                </p>

            </div>
        </div>

    </div>

</div>

{% endblock %}
