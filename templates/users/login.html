{% extends 'base.html' %}

{% block title %}Đăng nhập - TravelVN{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow border-0 mt-5">
            <div class="card-body p-4">

                <h2 class="text-center fw-bold mb-4">
                    Đăng nhập
                </h2>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">
                            Tên đăng nhập
                        </label>
                        {{ form.username }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Mật khẩu
                        </label>
                        {{ form.password }}
                    </div>

                    <button type="submit"
                            class="btn btn-primary w-100">
                        Đăng nhập
                    </button>

                </form>

                <hr>

                <p class="text-center mb-0">
                    Chưa có tài khoản?
                    <a href="{% url 'register' %}">
                        Đăng ký ngay
                    </a>
                </p>

            </div>
        </div>

    </div>

</div>

{% endblock %}
