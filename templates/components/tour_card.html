{% load money %}
<div class="card tour-card h-100 w-100 shadow-sm">

    <div class="position-relative">

        <!-- ❤️ Wishlist -->

        <button class="wishlist-btn position-absolute top-0 end-0 m-2" data-id="{{ tour.id }}">

            {% if tour.id in wishlist_ids %}
                <i class="bi bi-heart-fill heart active"></i>
            {% else %}
                <i class="bi bi-heart heart"></i>
            {% endif %}

        </button>


        {% if tour.image %}
            <img src="{{ tour.image.url }}" class="card-img-top w-100" style="height:220px; object-fit:cover;">
        {% else %}
            <img src="/static/images/no-image.jpg"
                class="card-img-top"
                style="height:220px; object-fit:cover;">
        {% endif %}
    </div>

    <div class="card-body">

        <h5 class="fw-bold">{{ tour.name }}</h5>

        <p class="text-muted mb-1">
            📍 {{ tour.destination }}
        </p>

        <p class="text-danger fw-bold fs-5">
            {{ tour.price|money }}
        </p>

        {% if tour.slots > 0 %}
            <p class="text-success">
                Còn {{ tour.slots }} chỗ
            </p>
        {% else %}
            <p class="text-danger fw-bold">
                Hết chỗ
            </p>
        {% endif %}

        {% if tour.slots > 0 %}
            <a href="{% url 'tour_detail' tour.id %}"
            class="btn btn-primary w-100">
                Xem chi tiết
            </a>
        {% else %}
            <button class="btn btn-secondary w-100" disabled>
                Hết chỗ
            </button>
        {% endif %}

    </div>
</div>
