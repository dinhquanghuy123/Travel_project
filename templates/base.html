<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Web Du Lịch</title>
</head>
<body>

    <nav>
    <a href="/">Trang chủ</a>

    {% if request.user.is_authenticated %}
        <a href="/users/profile/">Xin chào {{ request.user.username }}</a>
        <a href="/users/logout/">Đăng xuất</a>
    {% else %}
        <a href="/users/login/">Đăng nhập</a>
        <a href="/users/register/">Đăng ký</a>
    {% endif %}
</nav>

<hr>

{% block content %}
{% endblock %}
    
</body>
</html>
